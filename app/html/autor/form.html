<form name="form" ng-submit="save()">
	<div class="modal-header">
		<h3 class="modal-title">{{action}} autor</h3>
	</div>
	<div class="modal-body hide-buttons" ng-include="'html/autor/inputs.html'"></div>
	<div class="modal-footer">
		<button type="submit" class="btn btn-default" ng-disabled="form.$invalid">Guardar</button>
		<button type="button" class="btn btn-warning" ng-click="cancel()">Cancel</button>
	</div>
</form>
<show-error-messages></show-error-messages>
