<form name="form" ng-submit="save()">
    <div class="modal-header">
        <h3 class="modal-title">{{action}} libro</h3>
    </div>

    <div class="modal-body hide-buttons" ng-include="'html/libro/inputs.html'"></div>
    <div class="modal-footer">
        <button type="submit" class="btn btn-default" ng-disabled="form.$invalid || autores_selecteds.length == 0">Guardar</button>
        <button type="button" class="btn btn-warning" ng-click="cancel()">Cancel</button>
    </div>
</form>
<show-error-messages></show-error-messages>
